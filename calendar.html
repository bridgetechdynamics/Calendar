<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dynamic Vanilla Calendar</title>
  <link rel="stylesheet" href="calendar.css?v=1">
  <style>
    /* Use rules like #panel-confirm, #add-event-button, #panel-edit .hero-actions button, and .api-panel to hide controls via CSS. */
  </style>
</head>
<body>
  <div class="calendar-shell">
    <header class="calendar-header">
      <div>
        <p class="eyebrow">Calendar Control</p>
        <h1 id="calendar-title" class="calendar-title">March 2026</h1>
      </div>
      <div class="controls">
        <div class="control-group">
          <label for="month-select">Month</label>
          <select id="month-select" aria-label="Select month"></select>
          <button class="round-button" type="button" data-action="prev-month" aria-label="Previous month">&#9664;</button>
          <button class="round-button" type="button" data-action="next-month" aria-label="Next month">&#9654;</button>
        </div>
        <div class="control-group">
          <label for="year-select">Year</label>
          <select id="year-select" aria-label="Select year"></select>
          <button class="round-button" type="button" data-action="prev-year" aria-label="Previous year">&#9664;</button>
          <button class="round-button" type="button" data-action="next-year" aria-label="Next year">&#9654;</button>
        </div>
        <div class="control-group today-button">
          <button id="today-button" type="button">Today</button>
        </div>
        <div class="control-group holiday-toggle">
          <label class="toggle-label" for="holiday-toggle">Holidays</label>
          <label class="switch">
            <input type="checkbox" id="holiday-toggle" checked />
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div id="tag-filter-row" class="tag-display hidden" aria-live="polite"></div>
    </header>

    <div class="calendar-grid">
      <div class="weekday-row">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>
      <div id="calendar-days" class="days-grid"></div>
    </div>

    <section class="api-panel">
      <h2>Calendar API</h2>
      <div class="api-grid">
        <form id="api-add-form" class="api-form">
          <label for="api-add-input">Add / update events (JSON array)</label>
          <textarea id="api-add-input" placeholder='[{"id":7,"label":"New Event","date":"2026-03-30","href":"https://example.com"}]'></textarea>
          <div class="api-form-actions">
            <button type="submit" class="save-button">Push events</button>
            <span id="api-add-status" class="api-status"></span>
          </div>
        </form>
        <form id="api-remove-form" class="api-form">
          <label for="api-remove-input">Remove events (JSON ids)</label>
          <textarea id="api-remove-input" placeholder='[{"id":2},{"id":7}]'></textarea>
          <div class="api-form-actions">
            <button type="submit" class="save-button">Remove events</button>
            <span id="api-remove-status" class="api-status"></span>
          </div>
        </form>
      </div>
      <div class="api-form-actions">
        <button type="button" id="api-log-events" class="save-button">Log current events</button>
        <button type="button" id="api-clear-events" class="cancel-button">Clear stored events</button>
        <span id="api-log-status" class="api-status">Console output only</span>
        <span id="api-clear-status" class="api-status"></span>
      </div>
    </section>
  </div>

  <div id="day-panel" class="overlay hidden" aria-hidden="true">
    <div class="panel">
      <button class="close-panel" type="button" aria-label="Close panel">&times;</button>
      <div id="panel-display" class="panel-section">
        <div class="panel-display__header">
          <h3>Events for <span id="panel-date"></span></h3>
          <div class="hero-actions">
            <button type="button" class="save-button" id="add-event-button">Add Event</button>
          </div>
        </div>
        <div id="event-list"></div>
      </div>

      <div id="panel-view" class="panel-section hidden">
        <h3>View Event</h3>
        <p class="edit-id">Event ID: <span id="view-id-value"></span></p>
        <p class="view-field"><span class="label">Label:</span> <span id="view-label"></span></p>
        <p class="view-field"><span class="label">Date:</span> <span id="view-date"></span></p>
        <p class="view-field view-link"><span class="label">Link:</span> <a id="view-link" target="_blank" rel="noreferrer"></a></p>
        <p class="view-field" id="view-tag-line"><span class="label">Tag:</span> <span id="view-tag"></span></p>
        <div class="hero-actions">
          <button type="button" class="cancel-button" id="view-cancel">Cancel</button>
          <button type="button" class="save-button" id="view-edit">Edit</button>
        </div>
      </div>

      <div id="panel-edit" class="panel-section hidden">
        <h3>Edit Event</h3>
        <p class="edit-id">Event ID: <span id="edit-id-value"></span></p>
        <form id="edit-form">
          <div>
            <label for="edit-label">Label</label>
            <input id="edit-label" name="label" required />
          </div>
          <div>
            <label for="edit-href">Link (optional)</label>
            <input id="edit-href" name="href" placeholder="https://" />
          </div>
          <div class="tag-select hidden" data-role="tag-select">
            <label for="edit-tag">Tag</label>
            <select id="edit-tag">
              <option value="">None</option>
            </select>
          </div>
          <div>
            <label for="edit-date">Date</label>
            <input id="edit-date" name="date" type="date" required />
          </div>
          <div class="hero-actions">
            <button type="button" class="cancel-button" id="cancel-edit">Cancel</button>
            <button type="submit" class="save-button">Save</button>
          </div>
        </form>
      </div>

      <div id="panel-add" class="panel-section hidden">
        <h3>Add Event</h3>
        <p class="edit-id">Event ID: <span id="add-id-value"></span></p>
        <form id="add-form">
          <div>
            <label for="add-label">Label</label>
            <input id="add-label" name="label" required />
          </div>
          <div>
            <label for="add-href">Link (optional)</label>
            <input id="add-href" name="href" placeholder="https://" />
          </div>
          <div class="tag-select hidden" data-role="tag-select">
            <label for="add-tag">Tag</label>
            <select id="add-tag">
              <option value="">None</option>
            </select>
          </div>
          <div>
            <label for="add-date">Date</label>
            <input id="add-date" name="date" type="date" required />
          </div>
          <div class="hero-actions">
            <button type="button" class="cancel-button" id="cancel-add">Cancel</button>
            <button type="submit" class="save-button">Save</button>
          </div>
        </form>
      </div>

      <div id="panel-confirm" class="panel-section hidden confirm-panel">
        <h3>Delete event?</h3>
        <p>This action cannot be undone.</p>
        <div class="hero-actions" style="justify-content:center;">
          <button type="button" class="cancel-button" id="cancel-delete">Cancel</button>
          <button type="button" class="save-button" id="confirm-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="calendar-app.js?v=3"></script>
  <script>
    const EventDefinition = {
      attributes: [
        { name: 'id', viewSelector: '#view-id-value' },
        { name: 'label', editSelector: '#edit-label', addSelector: '#add-label', viewSelector: '#view-label' },
        { name: 'href', editSelector: '#edit-href', addSelector: '#add-href', viewSelector: '#view-link' },
        { name: 'date', editSelector: '#edit-date', addSelector: '#add-date', viewSelector: '#view-date' },
        { name: 'tag', editSelector: '#edit-tag', addSelector: '#add-tag', viewSelector: '#view-tag' }
      ]
    };
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const initialTags = [
        { key: 'foo', label: 'Foo', color: 'red' },
        { key: 'bar', label: 'Bar', color: 'green' },
        { key: 'baz', label: 'Baz', color: 'blue' },
        { key: 'qux', label: 'Qux', color: 'orange' }
      ];
      const initialEvents = [
        { id: 1, label: 'Design review', date: `${year}-${month}-18`, tag: initialTags[0], href: 'https://example.com/client-review' },
        { id: 2, label: 'Team sync', date: `${year}-${month}-18`, tag: initialTags[1] },
        { id: 3, label: 'Client demo', date: `${year}-${month}-22`, tag: initialTags[2], href: 'https://example.com/demo' },
        { id: 4, label: 'Launch prep', date: `${year}-${month}-27`, tag: initialTags[3] },
        { id: 5, label: 'Client demo', date: `${year}-${month}-27`, tag: initialTags[0], href: 'https://example.com/demo' },
        { id: 6, label: 'Team sync', date: `${year}-${month}-27`, tag: initialTags[1] }
      ];
      window.CalendarApp.init(initialEvents, initialTags, EventDefinition,{ pre_cache: false, post_cache: false });
      if (typeof window.attachCalendarApiPanelHandlers === 'function') {
        window.attachCalendarApiPanelHandlers();
      }
    });
  </script>
</body>
</html>
