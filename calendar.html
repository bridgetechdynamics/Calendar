<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dynamic Vanilla Calendar</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030712;
      --card: #0f172a;
      --border: rgba(148, 163, 184, 0.2);
      --accent: #38bdf8;
      --accent-strong: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(14, 165, 233, 0.25), transparent 45%) , var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .calendar-shell {
      width: min(100%, 960px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 30px 60px rgba(2, 6, 23, 0.6);
      position: relative;
    }

    .calendar-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .calendar-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      letter-spacing: 0.02em;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.3em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .control-group {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      background: rgba(148, 163, 184, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
    }

    .control-group label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    select,
    button {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
    }

    select {
      min-width: 120px;
      padding: 0.25rem 0;
    }

    .round-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.5);
      background: rgba(59, 130, 246, 0.1);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .round-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .today-button {
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(14, 165, 233, 0.15));
    }

    .calendar-grid {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 1rem;
    }

    .weekday-row,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekday-row {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .day-cell {
      border-radius: 14px;
      min-height: 110px;
      padding: 0.6rem;
      margin: 0.15rem;
      background: rgba(148, 163, 184, 0.05);
      position: relative;
      cursor: pointer;
      transition: border 0.2s ease, background 0.2s ease;
    }

    .day-cell:hover {
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .day-number {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .day-cell.today {
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
    }

    .day-cell.selected {
      border: 2px solid var(--accent);
    }

    .event-badges {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    .event-badge {
      padding: 0.2rem 0.45rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .event-badge a {
      color: var(--accent-strong);
      text-decoration: none;
    }

    .more-link {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-strong);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 0.25rem;
      text-decoration: underline;
      text-align: left;
    }

    .holiday-label {
      position: absolute;
      bottom: 0.4rem;
      right: 0.6rem;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(235, 226, 52, 0.9);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 50;
    }

    .panel {
      background: var(--card);
      border-radius: 24px;
      max-width: 480px;
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 1.5rem;
      position: relative;
      box-shadow: 0 30px 60px rgba(2, 6, 23, 0.6);
    }

    .overlay.hidden {
      display: none;
    }

    .close-panel {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--muted);
    }

    .panel h3 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.4rem;
    }

    .event-entry {
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 0.75rem 0.85rem;
      border-radius: 16px;
      margin-bottom: 0.55rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .event-entry a {
      color: var(--accent-strong);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .event-entry .label {
      font-weight: 600;
    }

    .event-actions {
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }

    .event-actions button {
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .panel-section {
      margin-top: 1rem;
    }

    .panel-section form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .panel-section label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .panel-section input {
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(148, 163, 184, 0.05);
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-size: 1rem;
    }

    .hero-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .hero-actions button {
      padding: 0.6rem 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .save-button {
      background: var(--accent);
      color: #030712;
    }

    .cancel-button,
    .today-button {
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .confirm-panel {
      text-align: center;
    }

    .confirm-panel p {
      margin-bottom: 1rem;
    }

    .empty-text {
      color: var(--muted);
      text-align: center;
      margin: 1rem 0;
    }

    @media (max-width: 700px) {
      body {
        padding: 1rem;
      }

      .calendar-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        width: 100%;
      }

      .days-grid .day-cell {
        min-height: 90px;
      }
    }
  </style>
</head>
<body>
  <div class="calendar-shell">
    <header class="calendar-header">
      <div>
        <p class="eyebrow">Calendar Control</p>
        <h1 id="calendar-title" class="calendar-title">March 2026</h1>
      </div>
      <div class="controls">
        <div class="control-group">
          <label for="month-select">Month</label>
          <select id="month-select" aria-label="Select month"></select>
          <button class="round-button" type="button" data-action="prev-month" aria-label="Previous month">&#9664;</button>
          <button class="round-button" type="button" data-action="next-month" aria-label="Next month">&#9654;</button>
        </div>
        <div class="control-group">
          <label for="year-select">Year</label>
          <select id="year-select" aria-label="Select year"></select>
          <button class="round-button" type="button" data-action="prev-year" aria-label="Previous year">&#9664;</button>
          <button class="round-button" type="button" data-action="next-year" aria-label="Next year">&#9654;</button>
        </div>
        <div class="control-group today-button">
          <button id="today-button" type="button">Today</button>
        </div>
      </div>
    </header>

    <div class="calendar-grid">
      <div class="weekday-row">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>
      <div id="calendar-days" class="days-grid"></div>
    </div>
  </div>

  <div id="day-panel" class="overlay hidden" aria-hidden="true">
    <div class="panel">
      <button class="close-panel" type="button" aria-label="Close panel">&times;</button>
      <div id="panel-display" class="panel-section">
        <h3>Events for <span id="panel-date"></span></h3>
        <div id="event-list"></div>
      </div>

      <div id="panel-edit" class="panel-section hidden">
        <h3>Edit Event</h3>
        <form id="edit-form">
          <div>
            <label for="edit-label">Label</label>
            <input id="edit-label" name="label" required />
          </div>
          <div>
            <label for="edit-href">Link (optional)</label>
            <input id="edit-href" name="href" placeholder="https://" />
          </div>
          <div>
            <label for="edit-date">Date</label>
            <input id="edit-date" name="date" type="date" required />
          </div>
          <div class="hero-actions">
            <button type="button" class="cancel-button" id="cancel-edit">Cancel</button>
            <button type="submit" class="save-button">Save</button>
          </div>
        </form>
      </div>

      <div id="panel-confirm" class="panel-section hidden confirm-panel">
        <h3>Delete event?</h3>
        <p>This action cannot be undone.</p>
        <div class="hero-actions" style="justify-content:center;">
          <button type="button" class="cancel-button" id="cancel-delete">Cancel</button>
          <button type="button" class="save-button" id="confirm-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      const US_HOLIDAYS = {
        '01-01':"New Year's Day",
        '01-20':"Martin Luther King Jr. Day",
        '02-17':"Presidents' Day",
        '05-25':"Memorial Day",
        '07-04':"Independence Day",
        '09-07':"Labor Day",
        '10-12':"Columbus Day",
        '11-11':"Veterans Day",
        '11-26':"Thanksgiving",
        '12-25':"Christmas Day"
      };

      const storageKey = 'ctd-calendar-events';
      const state = {
        month: new Date().getMonth(),
        year: new Date().getFullYear(),
        selectedDate: null,
        panelDate: null,
        editingEventId: null
      };

      const elements = {};
      let eventsById = new Map();

      const helpers = {
        pad: (value) => value.toString().padStart(2, '0'),
        formatISO: (date) => {
          const year = date.getFullYear();
          return `${year}-${helpers.pad(date.getMonth() + 1)}-${helpers.pad(date.getDate())}`;
        },
        sameDay: (a,b) => a === b
      };

      function cacheElements() {
        elements.monthSelect = document.getElementById('month-select');
        elements.yearSelect = document.getElementById('year-select');
        elements.calendarTitle = document.getElementById('calendar-title');
        elements.calendarDays = document.getElementById('calendar-days');
        elements.todayButton = document.getElementById('today-button');
        elements.dayPanel = document.getElementById('day-panel');
        elements.panelDate = document.getElementById('panel-date');
        elements.eventList = document.getElementById('event-list');
        elements.panelDisplay = document.getElementById('panel-display');
        elements.panelEdit = document.getElementById('panel-edit');
        elements.panelConfirm = document.getElementById('panel-confirm');
        elements.editForm = document.getElementById('edit-form');
        elements.editLabel = document.getElementById('edit-label');
        elements.editHref = document.getElementById('edit-href');
        elements.editDate = document.getElementById('edit-date');
        elements.closePanel = document.querySelector('.close-panel');
      }

      function populateSelects() {
        elements.monthSelect.innerHTML = MONTHS.map((name, index) => {
          return `<option value="${index}">${name}</option>`;
        }).join('');

        const currentYear = new Date().getFullYear();
        const span = 12;
        const start = currentYear - 6;
        const end = currentYear + span - 6;
        const options = [];
        for (let y = start; y <= end; y++) {
          options.push(`<option value="${y}">${y}</option>`);
        }
        elements.yearSelect.innerHTML = options.join('');
      }

      function attachControlHandlers() {
        elements.monthSelect.addEventListener('change', (event) => {
          state.month = Number(event.target.value);
          syncSelects();
          render();
        });

        elements.yearSelect.addEventListener('change', (event) => {
          state.year = Number(event.target.value);
          render();
        });

        document.querySelectorAll('[data-action]').forEach((button) => {
          button.addEventListener('click', () => {
            const action = button.dataset.action;
            if (action === 'prev-month') {
              adjustMonth(-1);
            } else if (action === 'next-month') {
              adjustMonth(1);
            } else if (action === 'prev-year') {
              adjustYear(-1);
            } else if (action === 'next-year') {
              adjustYear(1);
            }
          });
        });

        elements.todayButton.addEventListener('click', () => {
          const today = new Date();
          state.year = today.getFullYear();
          state.month = today.getMonth();
          state.selectedDate = helpers.formatISO(today);
          syncSelects();
          render();
        });

        elements.closePanel.addEventListener('click', () => hidePanel());
        elements.dayPanel.addEventListener('click', (event) => {
          if (event.target === elements.dayPanel) {
            hidePanel();
          }
        });

        elements.editForm.addEventListener('submit', (event) => {
          event.preventDefault();
          const eventId = state.editingEventId;
          if (!eventId) {
            showDisplayPanel();
            return;
          }
          const existingEvent = eventsById.get(eventId);
          if (!existingEvent) {
            showDisplayPanel();
            return;
          }
          existingEvent.label = elements.editLabel.value.trim();
          existingEvent.href = elements.editHref.value.trim() || undefined;
          existingEvent.date = elements.editDate.value;
          eventsById.set(eventId, existingEvent);
          persistEvents();
          if (state.panelDate !== existingEvent.date) {
            state.panelDate = existingEvent.date;
          }
          state.selectedDate = existingEvent.date;
          hideAllPanels();
          render();
          showDisplayPanel();
          renderDayPanel();
        });

        document.getElementById('cancel-edit').addEventListener('click', () => {
          showDisplayPanel();
        });

        document.getElementById('confirm-delete').addEventListener('click', () => {
          if (!state.editingEventId) {
            showDisplayPanel();
            return;
          }
          eventsById.delete(state.editingEventId);
          state.editingEventId = null;
          persistEvents();
          render();
          showDisplayPanel();
          renderDayPanel();
        });

        document.getElementById('cancel-delete').addEventListener('click', () => {
          showDisplayPanel();
        });
      }

      function hideAllPanels() {
        elements.panelDisplay.classList.add('hidden');
        elements.panelEdit.classList.add('hidden');
        elements.panelConfirm.classList.add('hidden');
      }

      function showDisplayPanel() {
        hideAllPanels();
        elements.panelDisplay.classList.remove('hidden');
      }

      function showEditPanel(eventId) {
        const eventData = eventsById.get(eventId);
        if (!eventData) {
          return;
        }
        state.editingEventId = eventId;
        elements.editLabel.value = eventData.label;
        elements.editHref.value = eventData.href || '';
        elements.editDate.value = eventData.date;
        hideAllPanels();
        elements.panelEdit.classList.remove('hidden');
      }

      function showConfirmPanel(eventId) {
        state.editingEventId = eventId;
        hideAllPanels();
        elements.panelConfirm.classList.remove('hidden');
      }

      function hidePanel() {
        elements.dayPanel.classList.add('hidden');
        elements.dayPanel.setAttribute('aria-hidden', 'true');
        state.panelDate = null;
        hideAllPanels();
        showDisplayPanel();
      }

      function syncSelects() {
        elements.monthSelect.value = state.month;
        if (elements.yearSelect.querySelector(`option[value="${state.year}"]`)) {
          elements.yearSelect.value = state.year;
        }
      }

      function adjustMonth(delta) {
        const tentative = new Date(state.year, state.month + delta, 1);
        state.year = tentative.getFullYear();
        state.month = tentative.getMonth();
        syncSelects();
        render();
      }

      function adjustYear(delta) {
        state.year += delta;
        syncSelects();
        render();
      }

      function getStoredEvents() {
        if (!window.localStorage) {
          return [];
        }
        const raw = window.localStorage.getItem(storageKey);
        if (!raw) {
          return [];
        }
        try {
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed;
        } catch (error) {
          console.warn('Unable to parse stored events', error);
          return [];
        }
      }

      function persistEvents() {
        if (!window.localStorage) {
          return;
        }
        const payload = JSON.stringify([...eventsById.values()]);
        window.localStorage.setItem(storageKey, payload);
      }

      function loadEvents() {
        eventsById.clear();
        const stored = getStoredEvents();
        stored.forEach((event) => {
          if (event && event.id && event.label && event.date) {
            eventsById.set(event.id, { ...event });
          }
        });
      }

      function getEventsForDate(dateString) {
        return [...eventsById.values()].filter((event) => event.date === dateString).sort((a, b) => a.id - b.id);
      }

      function renderDayPanel() {
        if (!state.panelDate) {
          return;
        }
        const formatted = new Date(state.panelDate);
        if (!isFinite(formatted)) {
          elements.panelDate.textContent = state.panelDate;
        } else {
          elements.panelDate.textContent = formatted.toLocaleDateString('en-US', {
            weekday: 'long',
            month: 'long',
            day: 'numeric',
            year: 'numeric'
          });
        }
        const events = getEventsForDate(state.panelDate);
        elements.eventList.innerHTML = '';
        if (!events.length) {
          elements.eventList.innerHTML = '<p class="empty-text">No events scheduled.</p>';
          showDisplayPanel();
          return;
        }
        events.forEach((eventItem) => {
          const item = document.createElement('div');
          item.className = 'event-entry';
          const label = document.createElement('span');
          label.className = 'label';
          label.textContent = eventItem.label;
          const details = document.createElement('div');
          details.className = 'event-actions';
          const link = document.createElement('a');
          link.href = eventItem.href || '#';
          link.textContent = eventItem.href ? 'Open link' : 'No link';
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.addEventListener('click', (event) => event.stopPropagation());
          const deleteBtn = document.createElement('button');
          deleteBtn.innerHTML = '×';
          deleteBtn.title = 'Delete event';
          deleteBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            showConfirmPanel(eventItem.id);
          });
          details.append(link, deleteBtn);
          item.append(label, details);
          item.addEventListener('click', () => {
            showEditPanel(eventItem.id);
          });
          elements.eventList.appendChild(item);
        });
        showDisplayPanel();
      }

      function render() {
        const firstOfMonth = new Date(state.year, state.month, 1);
        const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
        const startDay = firstOfMonth.getDay();

        elements.calendarTitle.textContent = `${MONTHS[state.month]} ${state.year}`;
        elements.calendarDays.innerHTML = '';
        syncSelects();

        const fragment = document.createDocumentFragment();
        const totalSlots = 42; // 6 weeks to cover month
        for (let i = 0; i < totalSlots; i++) {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          const dayNumber = document.createElement('div');
          dayNumber.className = 'day-number';
          const cellIndex = i - startDay + 1;
          if (i >= startDay && cellIndex <= daysInMonth) {
            dayNumber.textContent = cellIndex;
            const cellDate = new Date(state.year, state.month, cellIndex);
            const isoDate = helpers.formatISO(cellDate);
            cell.dataset.date = isoDate;
            const today = helpers.formatISO(new Date());
            if (helpers.sameDay(isoDate, today)) {
              cell.classList.add('today');
            }
            if (state.selectedDate && helpers.sameDay(isoDate, state.selectedDate)) {
              cell.classList.add('selected');
            }
            cell.addEventListener('click', () => {
              state.selectedDate = isoDate;
              state.panelDate = isoDate;
              render();
              openDayPanel(isoDate);
            });

            const events = getEventsForDate(isoDate);
            if (events.length) {
              const badges = document.createElement('div');
              badges.className = 'event-badges';
              events.slice(0, 3).forEach((eventItem) => {
                const badge = document.createElement('div');
                badge.className = 'event-badge';
                badge.textContent = eventItem.label;
                badges.appendChild(badge);
              });
              if (events.length > 3) {
                const more = document.createElement('button');
                more.type = 'button';
                more.className = 'more-link';
                more.textContent = `+${events.length - 3} more`;
                more.addEventListener('click', (evt) => {
                  evt.stopPropagation();
                  state.selectedDate = isoDate;
                  state.panelDate = isoDate;
                  openDayPanel(isoDate);
                });
                badges.appendChild(more);
              }
              cell.appendChild(badges);
            }

            const isoMonthDay = `${helpers.pad(cellDate.getMonth() + 1)}-${helpers.pad(cellDate.getDate())}`;
            if (US_HOLIDAYS[isoMonthDay]) {
              const holiday = document.createElement('span');
              holiday.className = 'holiday-label';
              holiday.textContent = US_HOLIDAYS[isoMonthDay];
              cell.appendChild(holiday);
            }
          } else {
            cell.classList.add('empty');
            dayNumber.textContent = '';
          }
          cell.appendChild(dayNumber);
          fragment.appendChild(cell);
        }

        elements.calendarDays.appendChild(fragment);
        if (state.panelDate) {
          renderDayPanel();
        }
      }

      function openDayPanel(dateISO) {
        state.panelDate = dateISO;
        renderDayPanel();
        elements.dayPanel.classList.remove('hidden');
        elements.dayPanel.setAttribute('aria-hidden', 'false');
      }

      function addEvents(incoming = [], { skipPersist = false } = {}) {
        const added = [];
        const skipped = [];
        incoming.forEach((eventItem) => {
          if (!eventItem || typeof eventItem.id === 'undefined' || typeof eventItem.label !== 'string' || !eventItem.date) {
            skipped.push({ reason: 'invalid payload', payload: eventItem });
            return;
          }
          if (eventsById.has(eventItem.id)) {
            skipped.push({ reason: 'duplicate id', id: eventItem.id });
            return;
          }
          eventsById.set(eventItem.id, {
            id: eventItem.id,
            label: eventItem.label,
            href: eventItem.href,
            date: eventItem.date
          });
          added.push(eventItem.id);
        });
        if (added.length && !skipPersist) {
          persistEvents();
          render();
        }
        return Promise.resolve({ success: true, added, skipped });
      }

      function removeEvents(targets = []) {
        const removed = [];
        const missing = [];
        targets.forEach((item) => {
          if (item && typeof item.id !== 'undefined' && eventsById.has(item.id)) {
            eventsById.delete(item.id);
            removed.push(item.id);
          } else {
            missing.push(item && item.id ? item.id : item);
          }
        });
        if (removed.length) {
          persistEvents();
          render();
        }
        return Promise.resolve({ success: true, removed, missing });
      }

      function setMonthYear(month, year) {
        const limitedMonth = Math.max(0, Math.min(11, month));
        const limitedYear = Number.isFinite(year ? Number(year) : year) ? Number(year) : state.year;
        state.month = limitedMonth;
        state.year = limitedYear;
        syncSelects();
        render();
        return Promise.resolve({ success: true, month: state.month, year: state.year });
      }

      function getEvents() {
        return Promise.resolve([...eventsById.values()]);
      }

      function init(initialEvents = []) {
        cacheElements();
        populateSelects();
        attachControlHandlers();
        loadEvents();
        state.selectedDate = helpers.formatISO(new Date());
        if (!eventsById.size && initialEvents.length) {
          addEvents(initialEvents, { skipPersist: true }).then(() => {
            persistEvents();
            render();
          });
        } else {
          render();
        }
      }

      const publicAPI = {
        init,
        addEvents,
        removeEvents,
        setMonthYear,
        getEvents
      };

      const initialEvents = [
        { id: 1, label: 'Design review', href: 'https://example.com/client-review', date: '2026-03-18' },
        { id: 2, label: 'Team sync', date: '2026-03-18' },
        { id: 3, label: 'Client demo', href: 'https://example.com/demo', date: '2026-03-22' },
        { id: 4, label: 'Launch prep', date: '2026-03-27' }
      ];

      document.addEventListener('DOMContentLoaded', () => {
        publicAPI.init(initialEvents);
        window.CalendarApp = publicAPI;
      });
    })();
  </script>
</body>
</html>
